<!DOCTYPE html>
<html class="h-100" xmlns:th="http://www.thymeleaf.org">

<head>
    <th:block th:replace="~{fragments/head :: header}" />
    <title>PrecioSmart - Solicitudes</title>
</head>

<body class="d-flex flex-column h-100">
    <header th:replace="~{fragments/nav.html :: nav}"></header>

    <main class="flex-shrink-0">
        <div class="container py-5">
            <div class="row justify-content-center">
                <div class="col-12 col-lg-10">
                    <div class="d-flex flex-wrap justify-content-between align-items-center mb-4 gap-3">
                        <h1 class="mb-0">Mis solicitudes</h1>
                    </div>

                    <div id="error-box" class="alert alert-danger d-none shadow-sm" role="alert">
                        Revisa los campos del formulario.
                    </div>

                    <div id="success-box" class="alert alert-success shadow-sm"
                        th:classappend="${success} ? '' : ' d-none'" role="alert">
                        Solicitud guardada correctamente.
                    </div>

                    <div class="card panel-xxl  shadow-sm p-4 mb-4 ">
                        <h2 class="h5 mb-3">Nueva solicitud</h2>
                        <form id="request-form" class="row g-3" method="post" enctype="multipart/form-data">
                            <div class="col-12 mb-3">
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="type" id="mode_add" value="0"
                                        checked>
                                    <label class="form-check-label" for="mode_add">Añadir un producto nuevo</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="type" id="mode_add_existing"
                                        value="1">
                                    <label class="form-check-label" for="mode_add_existing">Añadir producto existente en
                                        un nuevo supermercado</label>
                                </div>

                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="type" id="mode_modify" value="2">
                                    <label class="form-check-label" for="mode_modify">Modificar precio de un producto</label>
                                </div>
                            </div>

                            <div class="col-md-6 add-only d-none">
                                <label for="name" class="form-label">Nombre</label>
                                <input id="name" name="name" class="form-control form-control-lg" type="text"
                                    maxlength="60">
                            </div>

                            <div class="col-md-6 add-only d-none">
                                <label for="brand" class="form-label">Marca</label>
                                <input id="brand" name="brand" class="form-control form-control-lg" type="text"
                                    maxlength="60">
                            </div>

                            <div class="col-md-6 add-only d-none">
                                <label for="quantity" class="form-label">Cantidad</label>
                                <input id="quantity" name="quantity" class="form-control form-control-lg" type="text"
                                    maxlength="30" placeholder="Ej: 1 kg, 750 ml, 2 L">
                            </div>

                            <div class="col-md-3">
                                <label for="price" class="form-label">Precio</label>
                                <input id="price" name="price" class="form-control form-control-lg" type="number"
                                    min="0.01" step="0.01" required>
                            </div>

                            <div class="col-md-3">
                                <label for="supermarket" class="form-label">Supermercado</label>
                                <select id="supermarket" name="supermarket" class="form-select form-select-lg" required>
                                    <option value="">Selecciona...</option>
                                    <option value="Mercadona">Mercadona</option>
                                    <option value="Carrefour">Carrefour</option>
                                    <option value="Lidl">Lidl</option>
                                    <option value="Dia">Dia</option>
                                    <option value="Alcampo">Alcampo</option>
                                </select>
                            </div>

                            <div class="col-md-6">
                                <label for="ean" class="form-label">Codigo EAN</label>
                                <input id="ean" name="ean" class="form-control form-control-lg" type="text"
                                    minlength="8" maxlength="13" required>
                            </div>

                            <div class="col-md-6 add-only d-none">
                                <label for="photo" class="form-label">Foto</label>
                                <input id="photo" name="photo" class="form-control form-control-lg" type="file"
                                    accept="image/*">
                            </div>

                            <div class="col-12 pt-1">
                                <button class="btn btn-naranja btn-lg px-4" type="submit">Guardar solicitud</button>
                            </div>
                        </form>
                    </div>

                    <div class="card  panel-xxl shadow-sm p-4">
                        <h2 class="h5 mb-3">Solicitudes guardadas</h2>
                        <div id="request-list" class="d-grid gap-3">
                            <div th:if="${#lists.isEmpty(requests)}"
                                class="rounded-4 border bg-light-subtle p-4 text-center text-muted">
                                No hay solicitudes todavia.
                            </div>

                            <article th:each="r : ${requests}"
                                class="rounded-4 border border-secondary-subtle border-opacity-25 bg-white shadow-sm p-3 p-md-4">
                                <div th:replace="~{fragments/request-info :: requestInfo(${r})}"></div>
                            </article>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script th:src="@{/js/script-request.js}"></script>

    <th:block th:replace="~{fragments/footer.html :: footer}" />
</body>

</html>
