<!DOCTYPE html>
<html class="h-100" xmlns:th="http://www.thymeleaf.org">

<head>
    <th:block th:replace="~{fragments/head :: header}" />
    <title>PrecioSmart Notificaciones</title>
</head>

<body class="d-flex flex-column h-100 text-center">
    <header th:replace="~{fragments/nav.html :: nav}"></header>

    <main class="flex-shrink-0">
        <div class="container">
            <h1 class="mt-5 mb-5">Mis notificaciones</h1>
            <div class="panel-lg mb-5">
                <div id="notification-list" class="p-3">

                    <!-- Notificaciones en tiempo real se insertan aquí por JS -->

                    <!-- Notificaciones persistidas cargadas desde la BD -->
                    <th:block th:each="n : ${notifications}">
                        <!-- Solicitud aceptada -->
                        <div th:if="${n.request.status.name() == 'APPROVED'}"
                            class="notification d-flex flex-column p-4 mt-3 mb-3">
                            <div class="d-flex flex-row justify-content-center align-items-center text-center">
                                <h4 class="mb-0 d-flex flex-row">
                                    <b class="d-flex flex-row">Solicitud<h4 class="ms-2" style="color: green;">aceptada
                                        </h4></b>
                                </h4>
                            </div>
                            <div class="d-flex justify-content-start align-items-start mt-4">
                                <ul class="list-unstyled d-flex flex-column align-items-start gap-3">
                                    <li class="pb-2">
                                        <h5 class="mb-0">
                                            <b class="text-black">Nombre: </b>
                                            <span th:text="${n.request.name}"></span>
                                        </h5>
                                    </li>
                                    <li class="pb-2">
                                        <h5 class="mb-0">
                                            <b class="text-black">Fecha: </b>
                                            <span
                                                th:text="${#temporals.format(n.request.date, 'yyyy-MM-dd HH:mm')}"></span>
                                        </h5>
                                    </li>
                                </ul>
                            </div>
                        </div>

                        <!-- Solicitud rechazada -->
                        <div th:if="${n.request.status.name() == 'REJECTED'}"
                            class="notification d-flex flex-column p-4 mt-3 mb-3">
                            <div class="d-flex flex-row justify-content-center align-items-center text-center">
                                <h4 class="mb-0 d-flex flex-row">
                                    <b class="d-flex flex-row">Solicitud <h4 class="ms-2" style="color: red;">rechazada
                                        </h4></b>
                                </h4>
                            </div>
                            <div class="d-flex justify-content-start align-items-start mt-4">
                                <ul class="list-unstyled d-flex flex-column align-items-start gap-3">
                                    <li class="pb-2">
                                        <h5 class="mb-0">
                                            <b class="text-black">Nombre: </b>
                                            <span th:text="${n.request.name}"></span>
                                        </h5>
                                    </li>
                                    <li class="pb-2">
                                        <h5 class="mb-0">
                                            <b class="text-black">Fecha: </b>
                                            <span
                                                th:text="${#temporals.format(n.request.date, 'yyyy-MM-dd HH:mm')}"></span>
                                        </h5>
                                    </li>
                                </ul>
                            </div>
                        </div>
                    </th:block>

                    <!-- Mensaje si no hay notificaciones -->
                    <div th:if="${#lists.isEmpty(notifications)}" id="empty-msg" class="text-muted mt-4">
                        <h5>No hay ninguna notificacion</h5>
                    </div>

                </div>
            </div>
        </div>
        <script th:src="@{/js/script-notifications.js}"></script>
    </main>

    <th:block th:replace="~{fragments/footer.html :: footer}" />
</body>

</html>
