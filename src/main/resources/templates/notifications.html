<!DOCTYPE html>
<html class="h-100" xmlns:th="http://www.thymeleaf.org">

<head>
    <th:block th:replace="~{fragments/head :: header}" />
    <title>PrecioSmart Notificaciones</title>
</head>

<body class="d-flex flex-column h-100 text-center">
    <header th:replace="~{fragments/nav.html :: nav}"></header>

    <main class="flex-shrink-0">
        <div class="container">
            <div class="panel-sm">
                <h4>Probar notificaciones</h4>
                <div class="flex justify-content-center">
                    <button id="btn-aceptar" class="btn btn-success rounded-pill px-4">Aceptar</button>
                    <button id="btn-rechazar" class="btn btn-danger rounded-pill px-4">Rechazar</button>
                </div>
            </div>
            <h1 class="mt-5 mb-5">Mis notificaciones</h1>
            <div class="panel-lg mb-5">
                <div id="notification-list" class="p-3">
                    <div class="notification d-flex align-items-center p-4 mt-3 mb-3">
                        <p class="m-0">ℹ️ Así se vería una notificación. En los botones de abajo puedes enviar más.</p>
                    </div>
                </div>
            </div>
        </div>
        <script th:src="@{/js/script-notifications.js}"></script>
    </main>

    <th:block th:replace="~{fragments/footer.html :: footer}" />
</body>

</html>
