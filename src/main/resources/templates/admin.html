<!DOCTYPE html>
<html class="h-100" xmlns:th="http://www.thymeleaf.org">

<head>
    <th:block th:replace="~{fragments/head :: header}" />
    <title>IW: Admin</title>
    <link rel="stylesheet" th:href="@{/css/simple-datatables-10.css}" href="/css/simple-datatables-10.css"
        type="text/css" />
</head>

<body class="d-flex flex-column h-100 text-center">
    <header th:replace="~{fragments/nav.html :: nav}"></header>

    <main class="flex-shrink-0">
        <div class="container">
            <h1 class="mt-5 mb-5">Administrar solicitudes</h1>
            <div class="panel-xl mb-5">

                <h2 class="h5 mb-3">Selecciona el tipo</h2>
                <div class="col-12 mb-3">
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="type" id="pending-request" value="pending"
                            th:checked="${type == 'pending'}" onchange="window.location.href='/admin/mod/pending'">
                        <label class="form-check-label" for="pending-request">Pendientes</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="type" id="accepted-request" value="accepted"
                            th:checked="${type == 'accepted'}" onchange="window.location.href='/admin/mod/accepted'">
                        <label class="form-check-label" for="accepted-request">Aceptadas</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="type" id="rejected-request" value="rejected"
                            th:checked="${type == 'rejected'}" onchange="window.location.href='/admin/mod/rejected'">
                        <label class="form-check-label" for="rejected-request">Rechazadas</label>
                    </div>
                </div>

                <!-- REQUEST LIST -->
                <div id="request-list" class="p-3 text-start">
                    <div th:if="${requests.empty}">
                        <h2 class="h5 mb-3">No hay solicitudes</h2>
                    </div>
                    <div th:each="req : ${requests}">
                        <div class="notification d-flex align-items-center justify-content-between p-3 mt-3 mb-3">
                            <div th:replace="~{fragments/request-info :: requestInfo(${req})}"></div>
                            <div class="d-flex gap-2 mt-3 ms-3" th:if="${type == 'pending'}">
                                <form th:action="@{/admin/mod/accept}" method="POST" class="accept-form">
                                    <input type="hidden" name="id" th:value="${req.id}">
                                    <button type="submit"
                                        class="btn btn-success rounded-pill px-4 btn-aceptar">Aceptar</button>
                                </form>
                                <form th:action="@{/admin/mod/reject}" method="POST" class="reject-form">
                                    <input type="hidden" name="id" th:value="${req.id}">
                                    <button type="submit"
                                        class="btn btn-danger rounded-pill px-4 btn-rechazar">Rechazar</button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>

        <script th:src="@{/js/script-admin.js}"></script>

    </main>

    <th:block th:replace="~{fragments/footer.html :: footer}" />
