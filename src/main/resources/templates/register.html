<!DOCTYPE html>
<html class="h-100" xmlns:th="http://www.thymeleaf.org">

<head>
    <th:block th:replace="~{fragments/head :: header}" />
    <title>PrecioSmart - Registrarse</title>
</head>

<body class="d-flex flex-column h-100">
    <header th:replace="~{fragments/nav.html :: nav}"></header>

    <main class="flex-shrink-0">
        <div class="container d-flex justify-content-center mt-5 ">
            <div class="register-box bg-white p-4 shadow-sm rounded panel-lg ">
                <form class="form-signin" method="post" th:action="@{/register}">
                    <h2 class="text-center mb-2">Registro</h2>
                     <div class="m-3 text-center">
                        <span th:if="${registerError}" class="text-danger" th:text="${registerError}"></span>
                    </div>
                    <div class="mb-3">
                        <label for="username" class="visually-hidden">Nombre de usuario</label>
                        <input type="text" id="username" name="username" class="form-control form-control-lg"
                            placeholder="Nombre de usuario" required="required">
                    </div>
                    <div class="mb-3">
                        <label for="email" class="visually-hidden">Email</label>
                        <input type="email" id="email" name="email" class="form-control form-control-lg"
                            placeholder="Email" required="required">
                    </div>
                    <div class="mb-3">
                        <label for="password" class="visually-hidden">Contraseña</label>
                        <input type="password" id="password" name="password" class="form-control form-control-lg"
                            placeholder="Contraseña" required="required">
                    </div>
                    <div class="mb-3">
                        <label for="confirmPassword" class="visually-hidden">Confirmar Contraseña</label>
                        <input type="password" id="confirmPassword" name="confirmPassword"
                            class="form-control form-control-lg" placeholder="Confirmar Contraseña" required="required">
                    </div>
                    <div class="d-grid">
                        <button class="btn btn-lg btn-warning" type="submit">Registrarse</button>
                    </div>
                    <div class="d-grid m-3">
                        <a type="submit" href="/login">¿Ya tienes cuenta? Inicia sesión</a>
                    </div>
                   

                </form>
            </div>
        </div>
    </main>

    <th:block th:replace="~{fragments/footer.html :: footer}" />
    <script th:src="@{/js/script-register.js}"></script>
</body>

</html>
