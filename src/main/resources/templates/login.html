<!DOCTYPE html>
<html class="h-100" xmlns:th="http://www.thymeleaf.org">

<head>
    <th:block th:replace="~{fragments/head :: header}" />
    <title>IW: Login</title>
</head>

<body class="d-flex flex-column h-100">
    <header th:replace="~{fragments/nav.html :: nav}"></header>

    <main class="flex-shrink-0">
        <div class="container d-flex justify-content-center mt-5">
            <div class="login-box bg-white p-4 shadow-sm rounded panel-lg ">
                <form class="form-signin" method="post" th:action="@{/login}">
                    <h2 class="text-center">Inicio de sesión</h2>
                     <div class="error-container m-3 text-center">
                        <span th:if="${loginError}" class="text-danger">
                            Error en nombre de usuario o contraseña
                        </span>
                        <span th:if="${registerOk}" class="text-success d-block" th:text="${registerOk}"></span>
                    </div>
                    <div class="mb-3">
                        <label for="username" class="visually-hidden">Nombre de usuario</label>
                        <input type="text" id="username" name="username" class="form-control form-control-lg"
                            placeholder="Nombre de usuario" required="required">
                    </div>
                    <div class="mb-3">
                        <label for="password" class="visually-hidden">Contraseña</label>
                        <input type="password" id="password" name="password" class="form-control form-control-lg"
                            placeholder="Contraseña" required="required">
                    </div>
                    <div class="d-grid mb-3">
                        <button class="btn btn-lg btn-warning" type="submit">Iniciar sesión</button>
                    </div>
                    <div class="d-grid">
                        <a type="submit" href="/register">¿No tienes cuenta? Regístrate</a>
                    </div>
                   
                </form>
            </div>
        </div>
    </main>

    <th:block th:replace="~{fragments/footer.html :: footer}" />
</body>

</html>
