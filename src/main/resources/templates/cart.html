<!DOCTYPE html>
<html class="h-100" xmlns:th="http://www.thymeleaf.org">

<head>
    <th:block th:replace="~{fragments/head :: header}" />
    <title>PrecioSmart- Mis Carritos</title>

</head>

<body class="d-flex flex-column h-100 text-center">
    <header th:replace="~{fragments/nav.html :: nav}"></header>

    <main class="flex-shrink-0">
        <div>
            <h3 class="text-center alert alert-danger" 
                th:text="${errorMessage}"
                th:if="${errorMessage != null}">
                Error
            </h3>

            <div class="panel-lg">
                <div class="d-flex justify-content-between align-items-center mt-2 mb-2">
                    <div>
                        <h1 class="text-start">
                            Mis carritos
                            <span th:text="'(' + ${(carts != null ? #lists.size(carts) : 0)} + ')'">(0)</span>
                        </h1>
                    </div>
                    <form method="post" th:action="@{/user/cart/gestionCarrito}">
                        <input type="hidden" name="cartId" th:if="${selectedCart != null}" th:value="${selectedCart.id}">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button class="btn btn-naranja"
                                th:if="${selectedCart != null}"
                                type="submit"
                                name="action" 
                                value="deleteCart">
                            <img class="svg-md" th:src="@{/img/svg/delete.svg}" alt="Borrar Carrito">
                        </button>
                        <button class="btn btn-naranja"
                                type="submit"
                                name="action"
                                value="newCart">
                            <img class="svg-md" th:src="@{/img/svg/new.svg}" alt="Nuevo Carrito">
                        </button>
                    </form>
                </div>
            
                <p id="mensajeSeleccion" class="text-start">Selecciona un carrito para ver su contenido.</p>
                <div class="d-flex flex-row flex-nowrap overflow-auto gap-3 pb-3"           
                    id="contenedorCarritos">
                    <div class="card card-carrito"
                        th:classappend="${selectedCart != null and selectedCart.id == cart.id} ? ' card-carrito-activa' : ''"
                        th:each="cart : ${carts}">
                        <form th:action="@{/user/cart/gestionCarrito}" method="post">
                            <input type="hidden" name="cartId" th:value="${cart.id}">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                            <div class="card-body text-start">
                                <h5 class="card-title fw-bold d-flex justify-content-between align-items-center mb-2">
                                    <input type="text"
                                        name="renameCart"
                                        th:value="${cart.name}"
                                        th:readonly="${editCart == false or selectedCart == null or selectedCart.id != cart.id}"
                                        th:disabled="${editCart == false or selectedCart == null or selectedCart.id != cart.id}"
                                        required maxlength="80">

                                    <button type="submit"
                                            formmethod="get"
                                            th:formaction="@{/user/cart}"
                                            name="editCart"
                                            value="true"
                                            class="btn btn-sm btn-edit"
                                            th:if="${editCart == false or selectedCart == null or selectedCart.id != cart.id}">
                                        <img class="svg-sm" th:src="@{/img/svg/edit.svg}" alt="Editar">
                                    </button>

                                    <button type="submit"
                                            name="action"
                                            value="renameCart"
                                            class="btn btn-sm btn-edit"
                                            th:if="${editCart == true and selectedCart != null and selectedCart.id == cart.id}">
                                        <img class="svg-sm" th:src="@{/img/svg/accept.svg}" alt="Guardar">
                                    </button>
                                </h5>

                                <p class="ms-2" th:text="${(cart.items != null ? #lists.size(cart.items) : 0) + ' Producto(s)'}">0 Productos</p>
                                <p class="ms-2" th:text="${'Creado: ' + (cart.date != null ? #temporals.format(cart.date, 'dd/MM/yyyy') : '-')}">01/01/2026</p>

                                <div class="d-flex gap-2 mt-2 justify-content-center">
                                    <button type="submit" 
                                            formmethod="get"
                                            th:formaction="@{/user/cart}"
                                            name="selectCart"
                                            th:value="${cart.id}"
                                            class="btn btn-sm btn-naranja"
                                            th:if="${selectedCart == null or selectedCart.id != cart.id}">
                                        Seleccionar
                                    </button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

            <div class="panel-lg">

                <p class="text-muted mb-3" th:if="${selectedCart == null}">Selecciona un carrito para ver los productos.</p>
                <div th:if="${selectedCart != null}">
                    <div id="tablaProductos" th:if="${selectedCart.items != null}">
                        <p class="text-muted mb-3" th:if="${#lists.isEmpty(selectedCart.items)}">
                            Este carrito está vacío actualmente.
                        </p>
                        <div class="div-responsive" th:if="${!#lists.isEmpty(selectedCart.items)}">
                            <table class="table-carrito align-middle mt-2 shadow-sm border">
                                <thead class="thead-carrito">
                                    <tr>
                                        <th>Producto</th>
                                        <th>Unidades</th>
                                        <th>Acción</th>
                                    </tr>
                                </thead>
                                    
                                <tbody class="tbody-carrito" th:each="item : ${selectedCart.items}">
                                    <tr>
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                        <td class="fw-bold text-start" th:text="${item.product.name + ' - EAN: ' + item.product.EAN}"></td>
                                        <td class="tProd-cantidad d-flex justify-content-center align-items-center">
                                            
                                            <button type="button" 
                                                    name="restaProd"
                                                    th:onclick="'actualizarCantidad(' + ${selectedCart.id} + ',' + ${item.id} + ', \'restaProd\')'" 
                                                    class="btn">-</button>
                                            <span class="tProd-cantidad-num" th:id="'qty-' + ${item.id}" th:text="${item.quantity}">1</span>
                                            <button type="button" 
                                                    name="sumaProd"
                                                    th:onclick="'actualizarCantidad(' + ${selectedCart.id} + ',' + ${item.id} + ', \'sumaProd\')'" 
                                                    class="btn">+</button>
                                            
                                        </td>
                                        <td>
                                            <button type="button" 
                                                    name="deleteProd"
                                                    th:onclick="'actualizarCantidad(' + ${selectedCart.id} + ',' + ${item.id} + ', \'deleteProd\')'" 
                                                    class="btn tProd-delete btn-sm">
                                                    <img class="svg-sm" th:src="@{/img/svg/delete.svg}" alt="Borrar Producto">
                                            </button>
                                        </td>
                                    </tr>
                                </tbody>
                                <tfoot class="tfoot-carrito">
                                    <tr>
                                        <td colspan="3" class="text-uppercase fw-bold">
                                            <button type="button" 
                                                name="deleteAll"
                                                th:onclick="'actualizarCantidad(' + ${selectedCart.id} + ',' + 'null' + ', \'deleteAll\')'" 
                                                class="btn tProd-delete btn-sm">
                                                <img class="svg-sm" th:src="@{/img/svg/delete.svg}" alt="Vaciar Carrito">
                                                Vaciar
                                            </button>
                                        </td>
                                    </tr>
                                </tfoot>
                            </table>
                        </div>
                        <a th:href="@{/user/search}" class="btn btn-naranja"><img class="svg-sm" th:src="@{/img/svg/search.svg}" alt="buscar">Buscar Productos</a>
                    </div>
                </div>
            </div>
            <th:block th:if="${selectedCart != null}">
                <div class="panel-lg" 
                    th:if="${selectedCart.items != null and !#lists.isEmpty(selectedCart.items)}">
                    <h3 class="text-center">
                        Precios por supermercado
                    </h3>
                </div>
            </th:block>
    </main>
    <script th:src="@{/js/script-cart.js}"></script>
